server:
  port: 8080

# Schema: Flyway runs first (V1__create_all_tables.sql), then Hibernate validates.
# Tables are created once; on restart Flyway skips applied migrations, data persists (file-based H2).
# For future changes: add V2__description.sql, V3__..., never edit V1 after it has been applied.
spring:
  # Aadhar configuration - disabled for current release
  profiles:
    active: dev
  aadhar:
    enabled: false
    baseUrl: https://aadhar-api.example.com
    xApiKey: test-key
    xApiSecret: test-secret
    timeout: 30

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB

  datasource:
    url: jdbc:h2:file:./data/tranzo_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
#    url: ${SPRING_DATASOURCE_URL}
#    driver-class-name: org.postgresql.Driver
#    username: ${SPRING_DATASOURCE_USERNAME}
#    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    # false avoids circular dependency: flyway <-> entityManagerFactory (Flyway runs first when false)
    defer-datasource-initialization: false

  flyway:
    enabled: false
    baseline-on-migrate: false
    # Set to false so app starts despite checksum mismatch (e.g. after editing V1). Run: ./mvnw flyway:repair from project root, then set back to true.
    validate-on-migrate: false

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true      # allows web access to H2 console
      path: /h2-console  # the URL path for the H2 dashboard

  jwt:
    secret: 7kP9xQeZyWvT2A1bNcLmJkHGFdsapOiuRANDOMKEY
    access-token-expiry-minutes: 100
    refresh-token-expiry-days: 7
    registration-token-expiry-minutes: 100
    issuer: tranzo-auth

# S3 media storage (env: AWS_S3_MEDIA_BUCKET, AWS_REGION)
app:
  s3:
    media-bucket: ${AWS_S3_MEDIA_BUCKET:}
    region: ${AWS_REGION:ap-south-1}
    presigned-url-expiry-minutes: 15

# Optional: cron for trip notification jobs (default: draft at 9am, upcoming at 8am daily)
# trip:
#   notification:
#     draft-reminder-cron: "0 0 9 * * ?"
#     upcoming-cron: "0 0 8 * * ?"

aws:
  region: ap-south-1
  access-key: ....
  secret-key: ....

ses:
  from-email: support@tranzo.in

twilio :
  enabled: false
  auth-token : auth_token
  phone-number : ....
  username : username
  sms-template: template

trip:
  image:
    unsplash:
      api-key: .....
      api-url: https://api.unsplash.com/search/photos
      per-page: 1
      orientation: landscape
      content-filter: low
    default-images: https://via.placeholder.com/800x600/3B82F6/FFFFFF?text=Trip

logging:
  level:
    org:
      springframework:
        transaction: DEBUG
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql: TRACE

