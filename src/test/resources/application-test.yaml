spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    
  flyway:
    enabled: false
    
  h2:
    console:
      enabled: false

  jwt:
    secret: test-secret-key-for-jwt-signing-min-256-bits-long
    access-token-expiry-minutes: 60
    refresh-token-expiry-days: 7
    registration-token-expiry-minutes: 60
    issuer: tranzo-auth-test

app:
  s3:
    media-bucket: 
    region: ap-south-1
    presigned-url-expiry-minutes: 15

# Disable external services in tests
aadhar:
  enabled: false
  baseUrl: https://aadhar-api.example.com
  xApiKey: test-key
  xApiSecret: test-secret
  timeout: 30

twilio:
  enabled: false
  auth-token: auth-token
  phone-number: phone-number
  username: username
  sms-template: sns-template

aws:
  region: region
  access-key: ses-access-key
  secret-key: ses-secret-key

logging:
  level:
    root: WARN
    com.tranzo: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
