name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to deploy (leave empty for latest master)'
        required: false
        default: 'master'
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      # 2. Setup Java (adjust version if needed)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. Build & Test (🔥 FAILS HERE if anything breaks)
      - name: Build & Test
        run: |
          chmod +x mvnw || true
          ./mvnw clean verify

      # 4. Clean old files on EC2
      - name: Clean Old Source Files on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            rm -rf /home/ec2-user/tranzo-user-ms/src
            rm -rf /home/ec2-user/tranzo-user-ms/target

      # 5. Transfer code
      - name: Transfer Code To Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/ec2-user/tranzo-user-ms"

          # 6. Build & Deploy
      - name: Build & Deploy on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /home/ec2-user/tranzo-user-ms

            # -----------------------------
            # Compute image tag
            # -----------------------------
            IMAGE_TAG=$(git rev-parse --short HEAD)
            GIT_SHA=$IMAGE_TAG        # same SHA for logging
            NAME=tranzo-user-ms       # friendly app name
          
            echo "Deploying image tag: $IMAGE_TAG"
            
            export DOCKER_BUILDKIT=0
            export COMPOSE_DOCKER_CLI_BUILD=0
            export IMAGE_TAG=$IMAGE_TAG
            export GIT_SHA=$GIT_SHA
            export NAME=$NAME

            # -----------------------------
            # Stop old container safely
            # -----------------------------
            docker compose down || true

            # -----------------------------
            # Build & run the new image
            # -----------------------------
            docker compose build --no-cache app
            docker compose up -d app

            # -----------------------------
            # Clean unused Docker resources
            # -----------------------------
            docker system prune -f --volumes --filter "label!=keep"

